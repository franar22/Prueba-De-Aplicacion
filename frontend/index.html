<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Tareas</title>
  <style>
    /* ── Reset & variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f6fb;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --danger:    #ef4444;
      --danger-h:  #dc2626;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);

      /* Colores de estado */
      --pendiente-bg:    #fef9c3; --pendiente-text:    #854d0e;
      --en_progreso-bg:  #dbeafe; --en_progreso-text:  #1e40af;
      --completada-bg:   #dcfce7; --completada-text:   #166534;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 600; color: var(--primary); }
    #api-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      font-weight: 500;
    }
    #api-status.ok  { background: #dcfce7; color: #166534; }
    #api-status.err { background: #fee2e2; color: #991b1b; }
    #api-status.loading { background: var(--border); color: var(--muted); }

    /* ── Layout ── */
    .container { max-width: 820px; margin: 0 auto; padding: 32px 16px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-number { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-label  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-card.pendiente  .stat-number { color: #854d0e; }
    .stat-card.progreso   .stat-number { color: #1e40af; }
    .stat-card.completada .stat-number { color: #166534; }

    /* ── Formulario ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .form-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    .field { margin-bottom: 14px; }
    label  { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    input, textarea, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
    }
    textarea { resize: vertical; min-height: 72px; }

    .form-row { display: flex; gap: 12px; }
    .form-row .field { flex: 1; }

    /* ── Botones ── */
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .08s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-danger:hover  { background: var(--danger-h); }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── Filtros ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Lista de tareas ── */
    #task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: box-shadow .15s;
    }
    .task-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-desc { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .badge-PENDIENTE   { background: var(--pendiente-bg);   color: var(--pendiente-text); }
    .badge-EN_PROGRESO { background: var(--en_progreso-bg); color: var(--en_progreso-text); }
    .badge-COMPLETADA  { background: var(--completada-bg);  color: var(--completada-text); }

    .task-date { font-size: 11px; color: var(--muted); }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Estado vacío / cargando ── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
      max-width: 300px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #16a34a; }
    #toast.error   { background: var(--danger); }

    /* ── Modal de edición ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 50px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    @media (max-width: 520px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <span class="logo">📋 Gestor de Tareas</span>
  <span id="api-status" class="loading">Conectando…</span>
</header>

<div class="container">

  <!-- ── Estadísticas ── -->
  <div class="stats">
    <div class="stat-card pendiente">
      <div class="stat-number" id="count-pendiente">—</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat-card progreso">
      <div class="stat-number" id="count-progreso">—</div>
      <div class="stat-label">En progreso</div>
    </div>
    <div class="stat-card completada">
      <div class="stat-number" id="count-completada">—</div>
      <div class="stat-label">Completadas</div>
    </div>
  </div>

  <!-- ── Formulario nueva tarea ── -->
  <div class="form-card">
    <h2>Nueva tarea</h2>
    <div class="field">
      <label for="new-title">Título *</label>
      <input id="new-title" type="text" placeholder="¿Qué hay que hacer?" maxlength="200" />
    </div>
    <div class="field">
      <label for="new-desc">Descripción</label>
      <textarea id="new-desc" placeholder="Detalles opcionales…" maxlength="1000"></textarea>
    </div>
    <div class="form-row">
      <div class="field">
        <label for="new-status">Estado inicial</label>
        <select id="new-status">
          <option value="PENDIENTE">Pendiente</option>
          <option value="EN_PROGRESO">En progreso</option>
          <option value="COMPLETADA">Completada</option>
        </select>
      </div>
      <div class="field" style="display:flex;align-items:flex-end;">
        <button class="btn btn-primary" style="width:100%" onclick="createTask()">
          Agregar tarea
        </button>
      </div>
    </div>
  </div>

  <!-- ── Lista ── -->
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(null, this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('PENDIENTE', this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('EN_PROGRESO', this)">En progreso</button>
      <button class="filter-btn" onclick="setFilter('COMPLETADA', this)">Completadas</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadTasks()">↻ Actualizar</button>
  </div>

  <div id="task-list">
    <div class="empty-state"><div class="icon">⏳</div><p>Cargando tareas…</p></div>
  </div>
</div>

<!-- ── Modal de edición ── -->
<div class="modal-overlay" id="edit-modal" onclick="closeModal(event)">
  <div class="modal">
    <h2>Editar tarea</h2>
    <input type="hidden" id="edit-id" />
    <div class="field">
      <label for="edit-title">Título *</label>
      <input id="edit-title" type="text" maxlength="200" />
    </div>
    <div class="field">
      <label for="edit-desc">Descripción</label>
      <textarea id="edit-desc" maxlength="1000"></textarea>
    </div>
    <div class="field">
      <label for="edit-status">Estado</label>
      <select id="edit-status">
        <option value="PENDIENTE">Pendiente</option>
        <option value="EN_PROGRESO">En progreso</option>
        <option value="COMPLETADA">Completada</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
  // ── Configuración ──────────────────────────────────────────
  // En local usa http://localhost:3000
  const API = 'http://10.0.6.219:3000';

  // Para apuntar a un servidor diferente, sobreescribe aquí:
  // const API = 'http://10.0.2.50:3000';

  let currentFilter = null;

  // ── API helpers ───────────────────────────────────────────
  async function apiFetch(path, options = {}) {
    const response = await fetch(`${API}${path}`, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({ message: 'Error desconocido' }));
      throw new Error(err.message || `HTTP ${response.status}`);
    }
    return response.status === 204 ? null : response.json();
  }

  // ── Conexión con el Back ──────────────────────────────────
  async function checkHealth() {
    const el = document.getElementById('api-status');
    try {
      const data = await apiFetch('/api/tasks/health');
      el.textContent = '● API conectada';
      el.className = 'ok';
      document.getElementById('count-pendiente').textContent  = data.pendientes;
      document.getElementById('count-progreso').textContent   = data.en_progreso;
      document.getElementById('count-completada').textContent = data.completadas;
    } catch {
      el.textContent = '● API sin conexión';
      el.className = 'err';
    }
  }

  // ── Cargar tareas ─────────────────────────────────────────
  async function loadTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div>';

    try {
      const url = currentFilter
        ? `/api/tasks?status=${currentFilter}`
        : '/api/tasks';
      const tasks = await apiFetch(url);
      renderTasks(tasks);
    } catch (e) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">⚠️</div>
        <p>No se pudo conectar con la API.<br><small>${e.message}</small></p>
      </div>`;
    }
    checkHealth();
  }

  function renderTasks(tasks) {
    const list = document.getElementById('task-list');
    if (!tasks.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>No hay tareas en esta vista.</p></div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-card">
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
          <div class="task-meta">
            <span class="badge badge-${t.status}">${statusLabel(t.status)}</span>
            <span class="task-date">${formatDate(t.createdAt)}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${t.id}, '${escAttr(t.title)}', '${escAttr(t.description||'')}', '${t.status}')">
            Editar
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">
            Eliminar
          </button>
        </div>
      </div>
    `).join('');
  }

  // ── Crear tarea ───────────────────────────────────────────
  async function createTask() {
    const title  = document.getElementById('new-title').value.trim();
    const desc   = document.getElementById('new-desc').value.trim();
    const status = document.getElementById('new-status').value;

    if (!title) { showToast('El título es obligatorio', 'error'); return; }

    try {
      await apiFetch('/api/tasks', {
        method: 'POST',
        body: JSON.stringify({ title, description: desc, status })
      });
      document.getElementById('new-title').value = '';
      document.getElementById('new-desc').value  = '';
      document.getElementById('new-status').value = 'PENDIENTE';
      showToast('Tarea creada correctamente', 'success');
      loadTasks();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // ── Eliminar tarea ────────────────────────────────────────
  async function deleteTask(id) {
    if (!confirm('¿Eliminar esta tarea?')) return;
    try {
      await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
      showToast('Tarea eliminada', 'success');
      loadTasks();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // ── Modal de edición ──────────────────────────────────────
  function openEdit(id, title, desc, status) {
    document.getElementById('edit-id').value     = id;
    document.getElementById('edit-title').value  = title;
    document.getElementById('edit-desc').value   = desc;
    document.getElementById('edit-status').value = status;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('edit-modal')) {
      document.getElementById('edit-modal').classList.remove('open');
    }
  }

  async function saveEdit() {
    const id     = document.getElementById('edit-id').value;
    const title  = document.getElementById('edit-title').value.trim();
    const desc   = document.getElementById('edit-desc').value.trim();
    const status = document.getElementById('edit-status').value;

    if (!title) { showToast('El título es obligatorio', 'error'); return; }

    try {
      await apiFetch(`/api/tasks/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ title, description: desc, status })
      });
      closeModal();
      showToast('Tarea actualizada', 'success');
      loadTasks();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // ── Filtros ───────────────────────────────────────────────
  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
  }

  // ── Utilidades ────────────────────────────────────────────
  function escHtml(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s)  { return s.replace(/'/g,"\\'").replace(/\n/g,' '); }
  function statusLabel(s) { return { PENDIENTE:'Pendiente', EN_PROGRESO:'En progreso', COMPLETADA:'Completada' }[s] || s; }
  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  // Enviar con Enter en el campo de título
  document.getElementById('new-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  // ── Inicio ────────────────────────────────────────────────
  loadTasks();
  setInterval(checkHealth, 30_000);   // verifica el estado cada 30 seg
</script>
</body>
</html>
