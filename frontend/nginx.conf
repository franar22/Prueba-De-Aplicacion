server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión ──
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── Headers de seguridad básicos ──
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";

    # ── Servir el index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverso opcional hacia el Back ──
    # Si quieres que el Front llame a /api/... y Nginx lo redirija
    # al Back internamente (evita CORS), descomenta esto y ajusta
    # la IP privada del EC2 Back:
    #
    # location /api/ {
    #     proxy_pass         http://10.0.2.XX:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    # }
}
