# =============================================
# Configuración del servidor
# =============================================
server.port=3000

# =============================================
# Base de datos MySQL
# Las variables de entorno se inyectan desde
# Docker / docker-compose o el EC2 de AWS.
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tasksdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
# update: crea/modifica tablas automáticamente al arrancar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Logging
# =============================================
logging.level.com.app=DEBUG
logging.level.org.springframework.web=INFO
